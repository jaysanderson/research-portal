app = "research-portal-arag"
primary_region = "iad"

[build]

[env]
  PORT = "8787"
  NODE_ENV = "production"
  DATA_DIR = "/data"

[mounts]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
